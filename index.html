<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01blue | Gateway</title>
    
    <!-- Content Security Policy to enforce secure asset loading -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; upgrade-insecure-requests;">
    
    <!-- Google Fonts: Outfit for a modern, digital feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-mode">

    <!-- Theme transition overlay -->
    <div class="transition-blinds">
        <div class="blind"></div>
        <div class="blind"></div>
        <div class="blind"></div>
        <div class="blind"></div>
        <div class="blind"></div>
    </div>

    <!-- Navigation -->
    <nav class="top-nav">
        <button id="theme-toggle" aria-label="Toggle Theme">
            <svg id="theme-icon" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <!-- Theme toggle icon -->
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </button>
    </nav>
    
    <!-- Background elements -->
    <div class="bg-elements"></div>

    <main class="gateway-container">
        <!-- Hero Header -->
        <header class="hero scroll-reveal">
            <h1 class="hero-title">
                <span class="digit">0</span><span class="digit">1</span><span class="word">blue</span>
            </h1>
            <p class="hero-subtitle">Digital Environment Portal</p>
        </header>

        <!-- Project Links -->
        <section class="portal-grid">
            
            <a href="https://manifest.01blue.org" class="portal-card scroll-reveal" id="card-archive">
                <div class="card-glow"></div>
                <div class="card-content">
                    <span class="card-number">01</span>
                    <h2>Portfolio</h2>
                    <p>Past projects, professional, and creative work.</p>
                </div>
            </a>

            <a href="https://cursorport.01blue.org/" class="portal-card scroll-reveal" id="card-cursorport">
                <div class="card-glow"></div>
                <div class="card-content">
                    <span class="card-number">02</span>
                    <h2>Cursorport</h2>
                    <p>A utility to seamlessly convert Windows cursor themes for Linux environments.</p>
                </div>
            </a>

            <!-- Experiments link -->
            <a href="#" class="portal-card scroll-reveal" id="card-experiments">
                <div class="card-glow"></div>
                <div class="card-content">
                    <span class="card-number">03</span>
                    <h2>Experiments</h2>
                    <p>Coming soon: CSS and Animation labs.</p>
                </div>
            </a>
            
        </section>
        
        <!-- Bottom spacer -->
        <div class="spacer" style="height: 40vh;"></div>
    </main>

    <!-- Anime.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <!-- Animation logic -->
    <script src="script.js"></script>
</body>
</html>
